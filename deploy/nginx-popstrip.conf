# PopStrip — nginx config for nginx-based static hosts (e.g. HestiaCP).
#
# WHY nginx and not the .htaccess: on nginx-fronted hosts, nginx serves static
# files directly and only proxies dynamic (PHP) requests to a backend — so for a
# static site the Apache .htaccess is never consulted. Install this as a per-domain
# nginx include (e.g. a HestiaCP nginx.ssl.conf_* file) or fold it into the vhost
# server block, then reload nginx.
#
# The three things this must get right (in priority order):
#   1. application/wasm MIME  — or MediaPipe (green screen / AR / face paint) breaks.
#   2. SPA history fallback   — unknown paths serve index.html.
#   3. cache policy           — hashed assets immutable; html/sw/manifest revalidate.

# 1) Correct MIME for WebAssembly. Modern nginx mime.types already maps this,
#    but assert it so a stripped mime.types can't serve .wasm as octet-stream.
types { application/wasm wasm; }

# 2) SPA history fallback: unknown paths → index.html (client routing).
#    NOTE: on HestiaCP-style per-domain INCLUDES the server block already has a
#    `location /`, so OMIT this block there (a duplicate location is an error) —
#    the exact-match cache rules below are include-safe. Keep this block only when
#    folding the config into a bare server { } that has no `location /`.
location / {
    try_files $uri $uri/ /index.html;
}

# 3a) Content-hashed build output is immutable — cache for a year.
location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
}

# 3b) The shell, the manifest, and the service worker MUST always revalidate,
#     so a redeploy (and a bumped sw.js CACHE) ships to clients promptly.
location = /index.html            { add_header Cache-Control "no-cache"; }
location = /sw.js                  { add_header Cache-Control "no-cache"; }
location = /manifest.webmanifest   { add_header Cache-Control "no-cache"; }

# 4) Compress text assets (nginx gzip is usually on globally; assert the types).
gzip on;
gzip_types text/css application/javascript application/json image/svg+xml application/wasm;
